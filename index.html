<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#0b2748">
<title>Flying V Mobile Skate Sharpening</title>
<style>html,body{margin:0;min-height:100%;background:#fff;font-family:system-ui,-apple-system,"Segoe UI",sans-serif}.loading{min-height:100vh;display:grid;place-items:center;padding:24px;text-align:center;color:#0b2748;font-weight:800}</style>
</head>
<body>
<div class="loading">Loading Flying V…</div>
<script>
fetch('./site.html?v=20260718-family-fix',{cache:'no-store'})
.then(r=>{if(!r.ok)throw new Error('Site load failed');return r.text()})
.then(html=>{
const fix=`<style id="family-photo-fix">
#about .photo{display:flex!important;flex-direction:column!important;overflow:hidden!important}
#about .photo img{width:100%!important;height:390px!important;aspect-ratio:auto!important;display:block!important;background:#f2f6f8!important;padding:0!important}
#about .photo.kevin img,#about .photo.eric img{object-fit:contain!important;object-position:center!important}
#about .photo.ella img{object-fit:cover!important;object-position:center 20%!important}
#about .photo-label{padding:14px 10px!important}
@media(max-width:650px){#about .photo-collage{grid-template-columns:1fr!important;gap:20px!important;max-width:330px!important;margin-inline:auto!important}#about .photo img{height:410px!important}}
</style>`;
html=html.replace('</head>',fix+'</head>');
document.open();document.write(html);document.close();
history.replaceState(null,'','./');
})
.catch(err=>{document.querySelector('.loading').textContent='The Flying V website could not load. Please refresh the page.';console.error(err)});
</script>
</body>
</html>
